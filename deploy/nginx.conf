# 法律判決類案搜尋系統 — nginx 反向代理設定
# 對應 docs/roadmap_v1.md 第 4 節（路線 B：api + nginx）。
# 由 docker-compose 的 nginx 服務掛載到 /etc/nginx/conf.d/default.conf。

upstream lcr_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # 上傳/回應大小（判決原文可能較長）
    client_max_body_size 2m;

    # gzip 壓縮 JSON 回應（案例列表/統計可觀）
    gzip on;
    gzip_types application/json;
    gzip_min_length 1024;

    # 健康檢查（部署探針常打，不寫 access log 減噪）
    location = /api/v1/health {
        access_log off;
        proxy_pass http://lcr_api;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://lcr_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 檢索含 LLM 改寫 + GPU 重排，首次載模型較久 → 放寬 timeout
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
